<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIDA SUPER HUB</title>
    <style>
        /* Neon Cyber / Anime Style (Neon Blau & Lila) */
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #00d2ff;
            text-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        /* Key System Bereich oben */
        .key-box {
            background: #131a26;
            border: 2px solid #9d4edd;
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.5);
            border-radius: 12px;
            padding: 20px;
            max-width: 400px;
            margin: 0 auto 40px auto;
        }

        .key-box h3 {
            color: #9d4edd;
            margin-top: 0;
        }

        input[type="text"] {
            width: 80%;
            padding: 10px;
            background-color: #0b0f19;
            border: 1px solid #00d2ff;
            border-radius: 6px;
            color: white;
            text-align: center;
            font-size: 1rem;
            outline: none;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 8px #00d2ff;
        }

        .status-message {
            margin-top: 10px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Grid für die Spiele-Blöcke */
        .hub-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Einzelne Spiele-Blöcke */
        .block {
            background: #131a26;
            border: 2px solid #00d2ff;
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            opacity: 0.4; /* Standardmäßig ausgegraut */
            pointer-events: none; /* Klicks deaktiviert */
        }

        /* Wenn der Key richtig ist, wird dieser Style aktiv */
        .block.unlocked {
            opacity: 1;
            pointer-events: auto;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        .block:hover.unlocked {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.6);
        }

        .block h2 {
            margin-top: 0;
            color: #00d2ff;
        }

        /* Copy Buttons */
        .copy-btn {
            background-color: #131a26;
            color: #00d2ff;
            border: 1px solid #00d2ff;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background-color: #00d2ff;
            color: #131a26;
            box-shadow: 0 0 10px #00d2ff;
        }
    </style>
</head>
<body>

    <h1>⚡ VIDA SUPER HUB ⚡</h1>

    <div class="key-box">
        <h3>🔑 Enter Key to Unlock Hub</h3>
        <input type="text" id="keyInput" placeholder="Enter Key Here..." oninput="checkKey()">
        <div id="status" class="status-message" style="color: #858fbb;">Locked 🔒</div>
    </div>
    <div class="hub-container">

        <div class="block" id="block1">
            <h2>🏴‍☠️ Blox Fruits</h2>
            <p>Hermanos Hub - Best Bounty & Auto Farm Script</p>
            <button class="copy-btn" onclick="copyScript(`loadstring(game:HttpGet('https://raw.githubusercontent.com/hermanos-dev/hermanos-hub/refs/heads/main/Loader.lua'))()`)">Copy Script</button>
        </div>

        <div class="block" id="block2">
            <h2>🎮 Block 2</h2>
            <p>Coming Soon...</p>
            <button class="copy-btn" onclick="copyScript('-- Soon')">Copy Script</button>
        </div>

    </div>

    <script>
        const correctKey = "Super-Hub777";

        // Funktion, die den eingegebenen Key überprüft
        function checkKey() {
            const input = document.getElementById("keyInput").value;
            const status = document.getElementById("status");
            const blocks = document.querySelectorAll(".block");

            if (input === correctKey) {
                status.innerText = "Access Granted! ✅ Unlocked";
                status.style.color = "#2ec4b6";
                document.getElementById("keyInput").style.borderColor = "#2ec4b6";
                
                // Alle Blöcke freischalten
                blocks.forEach(block => {
                    block.classList.add("unlocked");
                });
            } else if (input === "") {
                status.innerText = "Locked 🔒";
                status.style.color = "#858fbb";
                document.getElementById("keyInput").style.borderColor = "#00d2ff";
                
                // Blöcke wieder sperren, wenn das Feld geleert wird
                blocks.forEach(block => {
                    block.classList.remove("unlocked");
                });
            } else {
                status.innerText = "Wrong Key! ❌";
                status.style.color = "#ff4b4b";
                document.getElementById("keyInput").style.borderColor = "#ff4b4b";
                
                // Blöcke gesperrt lassen
                blocks.forEach(block => {
                    block.classList.remove("unlocked");
                });
            }
        }

        // Kopier-Funktion für die Buttons
        function copyScript(scriptText) {
            navigator.clipboard.writeText(scriptText).then(() => {
                alert("Script erfolgreich kopiert! Du kannst es jetzt in deinen Executor einfügen.");
            }).catch(err => {
                alert("Fehler beim Kopieren: " + err);
            });
        }
    </script>

</body>
</html>
